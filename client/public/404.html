<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ShopSmart</title>
    <script>
      // Single-page app redirect for GitHub Pages
      // Converts 404 into a redirect to index.html preserving the path
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 2).join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(1)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
</html>
