# ==============================================================================
# Antigravity — Docker Compose (Development)
# Usage:  docker compose up --build
# ==============================================================================

services:
  # ─── Backend: Node.js / Express API ──────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: antigravity-server
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
      - PORT=5001
      - DATABASE_URL=file:/app/prisma/dev.db
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost
    volumes:
      # Bind-mount source for live reload
      - ./server:/app
      # Persist node_modules separately (avoid overwriting container installs)
      - server-node-modules:/app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - antigravity-net

  # ─── Frontend: Vite Dev Server ───────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: antigravity-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5001
      - CHOKIDAR_USEPOLLING=true
    volumes:
      # Bind-mount source for hot-module replacement
      - ./client:/app
      # Persist node_modules separately
      - client-node-modules:/app/node_modules
    depends_on:
      server:
        condition: service_healthy
    networks:
      - antigravity-net

# ─── Networking ───────────────────────────────────────────────────────────────
networks:
  antigravity-net:
    driver: bridge

# ─── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  server-node-modules:
    driver: local
  client-node-modules:
    driver: local
