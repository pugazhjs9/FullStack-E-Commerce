apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopsmart-server
  namespace: shopsmart
  labels:
    app: shopsmart-server
spec:
  # Minimum 2 replicas for high availability
  replicas: 2
  selector:
    matchLabels:
      app: shopsmart-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: shopsmart-server
    spec:
      # Run as non-root user matching the Dockerfile appuser (UID 1000)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: server
          # IMAGE_PLACEHOLDER is replaced by the pipeline with the ECR URL
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5001"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # Liveness probe restarts the container if the health endpoint stops responding
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness probe keeps the pod out of the service endpoint until ready
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
