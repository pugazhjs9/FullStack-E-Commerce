name: AWS Production Pipeline

# Runs on every push/PR to main and on manual trigger
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Shared environment variables available to all jobs
env:
  AWS_REGION:        ${{ secrets.AWS_REGION }}
  APP_NAME:          shopsmart
  TF_VERSION:        1.7.5
  NODE_VERSION:      "20"

jobs:
  # ============================================================================
  # PHASE 1 — TESTING
  # Run unit + integration tests and upload reports as artifacts
  # ============================================================================

  test-server:
    name: "Phase 1 · Server Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          mkdir -p reports
          npm run test:unit -- --json --outputFile=reports/unit-results.json

      - name: Run integration tests
        run: |
          mkdir -p reports
          npm run test:integration -- --json --outputFile=reports/integration-results.json --runInBand

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-reports
          path: server/reports/
          retention-days: 14

  test-client:
    name: "Phase 1 · Client Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest unit tests
        run: |
          mkdir -p reports
          npm run test -- --reporter=json --outputFile=reports/client-results.json

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-test-reports
          path: client/reports/
          retention-days: 14

  # ============================================================================
  # PHASE 2 — INFRASTRUCTURE PROVISIONING (TERRAFORM)
  # Runs only after both test jobs pass
  # ============================================================================

  terraform:
    name: "Phase 2 · Terraform Apply"
    runs-on: ubuntu-latest
    needs: [test-server, test-client]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          # Disable the wrapper so `terraform output -raw` returns a plain value;
          # the default wrapper injects extra stdout that corrupts variable capture
          terraform_wrapper: false

      # Bootstrap the S3 bucket used as the Terraform backend (idempotent)
      - name: Bootstrap Terraform state bucket
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="${{ env.APP_NAME }}-tf-state-${{ github.repository_owner }}-${ACCOUNT_ID}"
          # Lowercase the bucket name (S3 requirement)
          BUCKET=$(echo "$BUCKET" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          echo "TF_STATE_BUCKET=$BUCKET" >> $GITHUB_ENV

          # Create the bucket; ignore "already exists" errors
          aws s3api create-bucket \
            --bucket "$BUCKET" \
            --region "${{ env.AWS_REGION }}" 2>/dev/null || true

          # Enable versioning on the state bucket
          aws s3api put-bucket-versioning \
            --bucket "$BUCKET" \
            --versioning-configuration Status=Enabled 2>/dev/null || true

          # Block public access on the state bucket
          aws s3api put-public-access-block \
            --bucket "$BUCKET" \
            --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true" 2>/dev/null || true

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.APP_NAME }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Wait for any DRAINING ECS services to fully stop
        run: |
          CLUSTER="${{ env.APP_NAME }}-cluster"
          for SVC in "${{ env.APP_NAME }}-server-service" "${{ env.APP_NAME }}-client-service"; do
            for i in $(seq 1 20); do
              STATUS=$(aws ecs describe-services \
                --cluster "$CLUSTER" --services "$SVC" \
                --query "services[0].status" --output text 2>/dev/null || echo "MISSING")
              if [ "$STATUS" != "DRAINING" ]; then
                echo "$SVC is $STATUS — continuing"
                break
              fi
              echo "  $SVC still DRAINING... waiting 15s ($i/20)"
              sleep 15
            done
          done

      - name: Import existing AWS resources into Terraform state
        working-directory: ./terraform
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION="${{ env.AWS_REGION }}"
          APP="${{ env.APP_NAME }}"

          # Helper: only import if not already in state
          tf_import_if_missing() {
            local addr=$1
            local id=$2
            if ! terraform state show "$addr" > /dev/null 2>&1; then
              echo "Importing $addr ($id)..."
              terraform import -var="aws_region=$REGION" -var="app_name=$APP" "$addr" "$id" 2>/dev/null || echo "  Skipped (resource may not exist yet)"
            else
              echo "  $addr already in state — skipping"
            fi
          }

          # ── S3 app-data bucket (deterministic name) ──────────────────────────
          tf_import_if_missing "aws_s3_bucket.app_data" "$APP-app-data-$ACCOUNT_ID"

          # ── ECR repositories ─────────────────────────────────────────────────
          tf_import_if_missing "aws_ecr_repository.server" "$APP-server"
          tf_import_if_missing "aws_ecr_repository.client" "$APP-client"

          # ── CloudWatch log group ─────────────────────────────────────────────
          tf_import_if_missing "aws_cloudwatch_log_group.ecs" "/ecs/$APP"

          # ── ECS cluster ──────────────────────────────────────────────────────
          CLUSTER_ARN=$(aws ecs describe-clusters --clusters "$APP-cluster" \
            --query "clusters[0].clusterArn" --output text 2>/dev/null || echo "")
          if [ -n "$CLUSTER_ARN" ] && [ "$CLUSTER_ARN" != "None" ]; then
            tf_import_if_missing "aws_ecs_cluster.main" "$APP-cluster"
          fi

          # ── ECS services (only if ACTIVE — skip if DRAINING) ─────────────────
          SERVER_SVC_STATUS=$(aws ecs describe-services \
            --cluster "$APP-cluster" --services "$APP-server-service" \
            --query "services[0].status" --output text 2>/dev/null || echo "")
          if [ "$SERVER_SVC_STATUS" = "ACTIVE" ]; then
            tf_import_if_missing "aws_ecs_service.server" "$APP-cluster/$APP-server-service"
          fi

          CLIENT_SVC_STATUS=$(aws ecs describe-services \
            --cluster "$APP-cluster" --services "$APP-client-service" \
            --query "services[0].status" --output text 2>/dev/null || echo "")
          if [ "$CLIENT_SVC_STATUS" = "ACTIVE" ]; then
            tf_import_if_missing "aws_ecs_service.client" "$APP-cluster/$APP-client-service"
          fi

          # ── ECS tasks security group ─────────────────────────────────────────
          for SG_NAME in "$APP-ecs-tasks-sg-v2" "$APP-ecs-tasks-sg"; do
            SG_ID=$(aws ec2 describe-security-groups \
              --filters "Name=group-name,Values=$SG_NAME" \
              --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || echo "")
            if [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ]; then
              tf_import_if_missing "aws_security_group.ecs_tasks" "$SG_ID"
              break
            fi
          done

          # ── ALB security group ────────────────────────────────────────────────
          ALB_SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=$APP-alb-sg" \
            --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || echo "")
          if [ -n "$ALB_SG_ID" ] && [ "$ALB_SG_ID" != "None" ]; then
            tf_import_if_missing "aws_security_group.alb" "$ALB_SG_ID"
          fi

          # ── Target groups — imported independently (survive partial runs) ──────
          SERVER_TG_ARN=$(aws elbv2 describe-target-groups --names "$APP-server-tg" \
            --query "TargetGroups[0].TargetGroupArn" --output text 2>/dev/null || echo "")
          if [ -n "$SERVER_TG_ARN" ] && [ "$SERVER_TG_ARN" != "None" ]; then
            tf_import_if_missing "aws_lb_target_group.server" "$SERVER_TG_ARN"
          fi

          CLIENT_TG_ARN=$(aws elbv2 describe-target-groups --names "$APP-client-tg" \
            --query "TargetGroups[0].TargetGroupArn" --output text 2>/dev/null || echo "")
          if [ -n "$CLIENT_TG_ARN" ] && [ "$CLIENT_TG_ARN" != "None" ]; then
            tf_import_if_missing "aws_lb_target_group.client" "$CLIENT_TG_ARN"
          fi

          # ── ALB + listener + rule ─────────────────────────────────────────────
          ALB_ARN=$(aws elbv2 describe-load-balancers --names "$APP-alb" \
            --query "LoadBalancers[0].LoadBalancerArn" --output text 2>/dev/null || echo "")
          if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
            tf_import_if_missing "aws_lb.main" "$ALB_ARN"

            LISTENER_ARN=$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" \
              --query "Listeners[0].ListenerArn" --output text 2>/dev/null || echo "")
            if [ -n "$LISTENER_ARN" ] && [ "$LISTENER_ARN" != "None" ]; then
              tf_import_if_missing "aws_lb_listener.http" "$LISTENER_ARN"

              RULE_ARN=$(aws elbv2 describe-rules --listener-arn "$LISTENER_ARN" \
                --query "Rules[?Priority=='10'].RuleArn | [0]" --output text 2>/dev/null || echo "")
              [ -n "$RULE_ARN" ] && [ "$RULE_ARN" != "None" ] && \
                tf_import_if_missing "aws_lb_listener_rule.api" "$RULE_ARN"
            fi
          fi

          echo "Import step complete."

      - name: Terraform Plan
        working-directory: ./terraform
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="app_name=${{ env.APP_NAME }}"

      - name: Terraform Apply
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="app_name=${{ env.APP_NAME }}"

  # ============================================================================
  # PHASE 3 — DOCKER BUILD + ECR PUSH + ECS FARGATE DEPLOY
  # ============================================================================

  build-and-deploy-ecs:
    name: "Phase 3 · Docker Build & ECS Deploy"
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # Derive all resource identifiers from the AWS account ID — no terraform
      # output piping needed because every name follows a deterministic pattern
      - name: Resolve AWS resource identifiers
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_BASE="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "ECR_SERVER=${ECR_BASE}/${{ env.APP_NAME }}-server" >> $GITHUB_ENV
          echo "ECR_CLIENT=${ECR_BASE}/${{ env.APP_NAME }}-client" >> $GITHUB_ENV
          echo "ECS_CLUSTER=${{ env.APP_NAME }}-cluster"           >> $GITHUB_ENV
          echo "ECS_SERVER_SVC=${{ env.APP_NAME }}-server-service" >> $GITHUB_ENV
          echo "ECS_CLIENT_SVC=${{ env.APP_NAME }}-client-service" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── Server image ───────────────────────────────────────────────────────
      - name: Build server Docker image
        run: |
          docker build \
            --tag "${{ env.ECR_SERVER }}:${{ github.sha }}" \
            --tag "${{ env.ECR_SERVER }}:latest" \
            ./server

      - name: Push server image to ECR
        run: |
          docker push "${{ env.ECR_SERVER }}:${{ github.sha }}"
          docker push "${{ env.ECR_SERVER }}:latest"

      # ── Client image ───────────────────────────────────────────────────────
      - name: Build client Docker image
        run: |
          docker build \
            --tag "${{ env.ECR_CLIENT }}:${{ github.sha }}" \
            --tag "${{ env.ECR_CLIENT }}:latest" \
            ./client

      - name: Push client image to ECR
        run: |
          docker push "${{ env.ECR_CLIENT }}:${{ github.sha }}"
          docker push "${{ env.ECR_CLIENT }}:latest"

      # ── Register new task definition revisions with the SHA-tagged image ───
      - name: Register new server task definition
        id: server-task-def
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${{ env.APP_NAME }}-server" \
            --query taskDefinition)

          NEW_DEF=$(echo "$TASK_DEF" | \
            jq --arg IMG "${{ env.ECR_SERVER }}:${{ github.sha }}" \
               '.containerDefinitions[0].image = $IMG |
                del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                    .compatibilities, .registeredAt, .registeredBy)')

          REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_DEF" \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)
          echo "arn=$REVISION" >> $GITHUB_OUTPUT

      - name: Register new client task definition
        id: client-task-def
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${{ env.APP_NAME }}-client" \
            --query taskDefinition)

          NEW_DEF=$(echo "$TASK_DEF" | \
            jq --arg IMG "${{ env.ECR_CLIENT }}:${{ github.sha }}" \
               '.containerDefinitions[0].image = $IMG |
                del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                    .compatibilities, .registeredAt, .registeredBy)')

          REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_DEF" \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)
          echo "arn=$REVISION" >> $GITHUB_OUTPUT

      # ── Force new deployment and wait for stability ─────────────────────────
      - name: Deploy server to ECS Fargate
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVER_SVC }}" \
            --task-definition "${{ steps.server-task-def.outputs.arn }}" \
            --force-new-deployment

      - name: Deploy client to ECS Fargate
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_CLIENT_SVC }}" \
            --task-definition "${{ steps.client-task-def.outputs.arn }}" \
            --force-new-deployment

      - name: Verify server service is running
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVER_SVC }}"

      - name: Verify client service is running
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_CLIENT_SVC }}"


