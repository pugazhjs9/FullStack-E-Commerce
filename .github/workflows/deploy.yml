name: Deploy to EC2

on:
  push:
    branches: [main] # Auto-deploy on every merge to main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" | tr -d '\r' > ~/.ssh/github_actions
          chmod 600 ~/.ssh/github_actions
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -tt -o StrictHostKeyChecking=no -i ~/.ssh/github_actions ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            set -ex

            echo '=== Pulling latest code ==='
            cd ~/FullStack-E-Commerce
            git fetch origin main
            git reset --hard origin/main

            echo '=== Updating backend ==='
            cd server
            npm install --omit=dev
            npm rebuild
            pm2 restart fullstack-backend || pm2 start src/index.js --name fullstack-backend

            echo '=== Updating frontend ==='
            cd ../client
            npm install
            npm rebuild
            npm run build

            echo '=== Syncing build to nginx ==='
            sudo mkdir -p /var/www/FullStack-E-Commerce/client/dist/
            sudo rsync -a --delete dist/ /var/www/FullStack-E-Commerce/client/dist/
            sudo systemctl reload nginx

            echo '=== Deploy complete ==='
          "

      - name: Health Check
        run: |
          STATUS="000"
          for attempt in 1 2 3; do
            echo "Health check attempt $attempt/3..."
            RESP=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${{ secrets.EC2_HOST }}:5001/api/health" 2>/dev/null) || RESP="000"
            echo "  → HTTP $RESP"
            if [ "$RESP" = "200" ]; then
              STATUS="200"
              break
            fi
            sleep 8
          done

          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check PASSED"
          else
            # Warn only — EC2 may not be configured; ECS/EKS is the primary deploy target
            echo "⚠️  Health check returned HTTP $RESP — EC2 may not be running or reachable"
          fi

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fail-logs-deploy
          path: |
            ~/.npm/_logs/
            **/*.log
          retention-days: 7
