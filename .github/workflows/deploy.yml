name: Deploy to EC2

on:
  push:
    branches: [main] # Auto-deploy on every merge to main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" | tr -d '\r' > ~/.ssh/github_actions
          chmod 600 ~/.ssh/github_actions
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -tt -o StrictHostKeyChecking=no -i ~/.ssh/github_actions ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            set -ex

            echo '=== Pulling latest code ==='
            cd ~/FullStack-E-Commerce
            git fetch origin main
            git reset --hard origin/main

            echo '=== Updating backend ==='
            cd server
            npm install --omit=dev
            npm rebuild
            pm2 restart fullstack-backend || pm2 start src/index.js --name fullstack-backend

            echo '=== Updating frontend ==='
            cd ../client
            npm install
            npm rebuild
            npm run build

            echo '=== Syncing build to nginx ==='
            sudo mkdir -p /var/www/FullStack-E-Commerce/client/dist/
            sudo rsync -a --delete dist/ /var/www/FullStack-E-Commerce/client/dist/
            sudo systemctl reload nginx

            echo '=== Deploy complete ==='
          "

