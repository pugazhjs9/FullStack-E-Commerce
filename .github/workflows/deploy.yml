name: Deploy to EC2

on:
  push:
    branches: [main]  # Auto-deploy on every merge to main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/github_actions
          chmod 600 ~/.ssh/github_actions
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/github_actions ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            echo "=== Pulling latest code ==="
            cd ~/shopsmart
            git pull origin main

            echo "=== Updating backend ==="
            cd server
            npm ci --omit=dev
            pm2 restart shopsmart-backend || pm2 start src/index.js --name shopsmart-backend

            echo "=== Updating frontend ==="
            cd ../client
            npm ci
            npm run build

            echo "=== Syncing build to nginx ==="
            sudo rsync -a --delete dist/ /var/www/shopsmart/client/dist/
            sudo systemctl reload nginx

            echo "=== Deploy complete ==="
          ENDSSH

      - name: Health Check
        run: |
          echo "Waiting for server to be ready..."
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://${{ secrets.EC2_HOST }}:5001/api/health" || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check FAILED (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Health check PASSED"

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fail-logs-deploy
          path: |
            ~/.npm/_logs/
            **/*.log
          retention-days: 7
